server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # If you deploy frontend + backend on same domain,
  # you can enable this reverse-proxy (adjust BACKEND_URL).
